<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Supervisor - Control de Tiempos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-6 font-sans">

    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-slate-800">Panel de Supervisor (Admin)</h1>
            <a href="index.html" class="text-blue-600 hover:underline">Ver vista de asesor &rarr;</a>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Formulario de Registro -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 lg:col-span-1 h-fit">
                <h2 class="text-xl font-bold mb-4 text-slate-700 border-b pb-2">Registrar Asesor</h2>
                <form id="form-operador" class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-600">ID del Asesor (Ej. Nomina)</label>
                        <input type="text" id="op-id" required class="w-full border p-2 rounded bg-slate-50 focus:ring focus:ring-blue-200 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-600">Nombre Completo</label>
                        <input type="text" id="op-nombre" required class="w-full border p-2 rounded bg-slate-50 focus:ring focus:ring-blue-200 outline-none">
                    </div>
                    
                    <div class="pt-4 border-t border-slate-100">
                        <h3 class="text-sm font-bold text-slate-500 mb-3 uppercase tracking-wide">Límites (En Minutos)</h3>
                        <div class="grid grid-cols-3 gap-2">
                            <div>
                                <label class="block text-xs font-semibold text-teal-600">Baño</label>
                                <input type="number" id="op-bano" value="15" required class="w-full border p-2 rounded text-center">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-orange-600">Comida</label>
                                <input type="number" id="op-comida" value="30" required class="w-full border p-2 rounded text-center">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-purple-600">Calidad</label>
                                <input type="number" id="op-calidad" value="15" required class="w-full border p-2 rounded text-center">
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded mt-4 transition">
                        Guardar / Actualizar Asesor
                    </button>
                </form>
            </div>

            <!-- Tabla de Asesores -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 lg:col-span-2 overflow-x-auto">
                <h2 class="text-xl font-bold mb-4 text-slate-700 border-b pb-2">Asesores Registrados</h2>
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-600 text-sm">
                            <th class="p-3 border-b">ID</th>
                            <th class="p-3 border-b">Nombre</th>
                            <th class="p-3 border-b text-center">Límites (B/C/Q)</th>
                            <th class="p-3 border-b text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-operadores" class="text-sm">
                        <tr><td colspan="4" class="p-4 text-center text-slate-400">Cargando asesores...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Firebase Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDT7iPaeRjlt-WIWWzwBh3deN2z_E-b2JA",
            authDomain: "corpodatos-935f9.firebaseapp.com",
            projectId: "corpodatos-935f9",
            storageBucket: "corpodatos-935f9.firebasestorage.app",
            messagingSenderId: "634601793039",
            appId: "1:634601793039:web:4412da30d31ff6f6e5657a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- Guardar Nuevo Operador ---
        document.getElementById('form-operador').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = "Guardando..."; btn.disabled = true;

            const id = document.getElementById('op-id').value.trim();
            const nombre = document.getElementById('op-nombre').value.trim();
            const bano = parseInt(document.getElementById('op-bano').value);
            const comida = parseInt(document.getElementById('op-comida').value);
            const calidad = parseInt(document.getElementById('op-calidad').value);

            try {
                // Guarda en la colección "operadores" con el ID como llave principal
                await setDoc(doc(db, "operadores", id), {
                    nombre: nombre,
                    limites: { bano, comida, calidad }
                });
                alert("Asesor guardado correctamente");
                e.target.reset();
                cargarOperadores(); // Recargar la tabla
            } catch (error) {
                console.error("Error al guardar:", error);
                alert("Hubo un error al guardar.");
            } finally {
                btn.innerText = originalText; btn.disabled = false;
            }
        });

        // --- Cargar Tabla de Operadores ---
        window.cargarOperadores = async function() {
            const tbody = document.getElementById('tabla-operadores');
            try {
                const querySnapshot = await getDocs(collection(db, "operadores"));
                tbody.innerHTML = '';
                
                if(querySnapshot.empty) {
                    tbody.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-slate-400">No hay asesores registrados.</td></tr>';
                    return;
                }

                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    tbody.innerHTML += `
                        <tr class="border-b hover:bg-slate-50 transition">
                            <td class="p-3 font-mono font-bold text-slate-600">${docSnap.id}</td>
                            <td class="p-3 font-semibold text-slate-800">${data.nombre}</td>
                            <td class="p-3 text-center">
                                <span class="bg-teal-100 text-teal-800 text-xs px-2 py-1 rounded mx-1" title="Baño">${data.limites.bano}m</span>
                                <span class="bg-orange-100 text-orange-800 text-xs px-2 py-1 rounded mx-1" title="Comida">${data.limites.comida}m</span>
                                <span class="bg-purple-100 text-purple-800 text-xs px-2 py-1 rounded mx-1" title="Calidad">${data.limites.calidad}m</span>
                            </td>
                            <td class="p-3 text-center">
                                <button onclick="eliminarOperador('${docSnap.id}')" class="text-red-500 hover:text-red-700 text-sm font-bold underline">Borrar</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-red-500">Error cargando datos. Revisa consola.</td></tr>';
            }
        }

        // --- Eliminar Operador ---
        window.eliminarOperador = async function(id) {
            if(confirm(`¿Estás seguro de eliminar el acceso del asesor con ID ${id}?`)) {
                await deleteDoc(doc(db, "operadores", id));
                cargarOperadores();
            }
        }

        // Cargar al iniciar
        cargarOperadores();
    </script>
</body>
</html>
