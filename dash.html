<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - Tiempos</title>
</head>
<body>

    <h1>Panel de Supervisor (Admin)</h1>
    <a href="index.html">Ir a vista de asesor</a>
    <hr>

    <h2>Registrar / Actualizar Asesor</h2>
    <form id="form-operador">
        <p>
            <label>ID del Asesor:</label>
            <input type="text" id="op-id" required>
        </p>
        <p>
            <label>Nombre Completo:</label>
            <input type="text" id="op-nombre" required>
        </p>
        <p>
            <label>Límite Baño (min):</label>
            <input type="number" id="op-bano" value="15" required>
        </label>
        <p>
            <label>Límite Comida (min):</label>
            <input type="number" id="op-comida" value="30" required>
        </p>
        <p>
            <label>Límite Calidad (min):</label>
            <input type="number" id="op-calidad" value="15" required>
        </p>
        <button type="submit">Guardar Asesor</button>
    </form>

    <hr>

    <h2>Asesores Registrados</h2>
    <table border="1" cellpadding="5">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Límites (Baño / Comida / Calidad)</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla-operadores">
            <tr><td colspan="4">Cargando...</td></tr>
        </tbody>
    </table>

    <!-- Firebase Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDT7iPaeRjlt-WIWWzwBh3deN2z_E-b2JA",
            authDomain: "corpodatos-935f9.firebaseapp.com",
            projectId: "corpodatos-935f9",
            storageBucket: "corpodatos-935f9.firebasestorage.app",
            messagingSenderId: "634601793039",
            appId: "1:634601793039:web:4412da30d31ff6f6e5657a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Guardar Operador
        document.getElementById('form-operador').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('op-id').value.trim();
            const nombre = document.getElementById('op-nombre').value.trim();
            const bano = parseInt(document.getElementById('op-bano').value);
            const comida = parseInt(document.getElementById('op-comida').value);
            const calidad = parseInt(document.getElementById('op-calidad').value);

            await setDoc(doc(db, "operadores", id), {
                nombre: nombre,
                limites: { bano, comida, calidad }
            });
            alert("Guardado");
            e.target.reset();
            cargarOperadores();
        });

        // Cargar Operadores
        window.cargarOperadores = async function() {
            const tbody = document.getElementById('tabla-operadores');
            const querySnapshot = await getDocs(collection(db, "operadores"));
            tbody.innerHTML = '';
            
            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                tbody.innerHTML += `
                    <tr>
                        <td>${docSnap.id}</td>
                        <td>${data.nombre}</td>
                        <td>${data.limites.bano}m / ${data.limites.comida}m / ${data.limites.calidad}m</td>
                        <td><button onclick="eliminarOperador('${docSnap.id}')">Borrar</button></td>
                    </tr>
                `;
            });
        }

        window.eliminarOperador = async function(id) {
            if(confirm("¿Borrar?")) {
                await deleteDoc(doc(db, "operadores", id));
                cargarOperadores();
            }
        }

        cargarOperadores();
    </script>
</body>
</html>
