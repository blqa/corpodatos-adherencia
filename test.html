<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tracker de Tiempos</title>
</head>
<body>

    <h1>Control de Tiempos (AUX)</h1>
    <hr>

    <!-- Login -->
    <div id="panel-login">
        <h3>Ingresa tu ID</h3>
        <input type="text" id="input-id" placeholder="Ej. 1001">
        <button onclick="validarID()" id="btn-login">Ingresar</button>
        <p id="login-error" style="color:red; display:none;">ID no encontrado.</p>
    </div>

    <!-- Controles (Ocultos hasta loguearse) -->
    <div id="panel-controles" style="display: none;">
        <p>
            <strong>Asesor:</strong> <span id="nombre-asesor-display"></span> 
            <button onclick="cerrarSesionLocal()">Cambiar Asesor</button>
        </p>
        <button onclick="probarDesconexion()">🧪 Probar Desconexión de TouchPoint</button>
        <hr>

        <div>
            <h2>Baño <span id="lbl-limite-bano"></span></h2>
            <p>Tiempo: <strong id="tiempo-bano" style="font-size: 24px;">00:00</strong></p>
            <p id="alerta-bano" style="color:red; display:none;">¡Límite excedido!</p>
            <button onclick="toggleEstado('bano')">Iniciar/Pausar Baño</button>
        </div>

        <div>
            <h2>Comida <span id="lbl-limite-comida"></span></h2>
            <p>Tiempo: <strong id="tiempo-comida" style="font-size: 24px;">00:00</strong></p>
            <p id="alerta-comida" style="color:red; display:none;">¡Límite excedido!</p>
            <button onclick="toggleEstado('comida')">Iniciar/Pausar Comida</button>
        </div>

        <div>
            <h2>Calidad <span id="lbl-limite-calidad"></span></h2>
            <p>Tiempo: <strong id="tiempo-calidad" style="font-size: 24px;">00:00</strong></p>
            <p id="alerta-calidad" style="color:red; display:none;">¡Límite excedido!</p>
            <button onclick="toggleEstado('calidad')">Iniciar/Pausar Calidad</button>
        </div>
    </div>

    <!-- Firebase y Lógica -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDT7iPaeRjlt-WIWWzwBh3deN2z_E-b2JA",
            authDomain: "corpodatos-935f9.firebaseapp.com",
            projectId: "corpodatos-935f9",
            storageBucket: "corpodatos-935f9.firebasestorage.app",
            messagingSenderId: "634601793039",
            appId: "1:634601793039:web:4412da30d31ff6f6e5657a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Worker para mantener el reloj vivo en segundo plano
        const workerCode = `
            let timer;
            self.addEventListener('message', (e) => {
                if(e.data === 'start') timer = setInterval(() => self.postMessage('tick'), 1000);
                else if(e.data === 'stop') clearInterval(timer);
            });
        `;
        const keepAliveWorker = new Worker(URL.createObjectURL(new Blob([workerCode], {type: 'application/javascript'})));
        keepAliveWorker.onmessage = () => { if (estadoActivo) actualizarPantalla(); };

        let asesorDatos = JSON.parse(localStorage.getItem('asesorDatos')) || null;
        let tiempos = { bano: 0, comida: 0, calidad: 0 };
        let estadoActivo = null;
        let tiempoInicio = null;
        let autoLogoutDisparado = false;

        if (asesorDatos) iniciarInterfazAsesor();

        function iniciarInterfazAsesor() {
            document.getElementById('nombre-asesor-display').innerText = asesorDatos.nombre;
            document.getElementById('panel-login').style.display = 'none';
            document.getElementById('panel-controles').style.display = 'block';

            document.getElementById('lbl-limite-bano').innerText = `(${asesorDatos.limites.bano}m max)`;
            document.getElementById('lbl-limite-comida').innerText = `(${asesorDatos.limites.comida}m max)`;
            document.getElementById('lbl-limite-calidad').innerText = `(${asesorDatos.limites.calidad}m max)`;
        }

        window.validarID = async function() {
            const inputId = document.getElementById('input-id').value.trim();
            if (inputId) {
                const docSnap = await getDoc(doc(db, "operadores", inputId));
                if (docSnap.exists()) {
                    asesorDatos = { id: inputId, ...docSnap.data() };
                    localStorage.setItem('asesorDatos', JSON.stringify(asesorDatos));
                    iniciarInterfazAsesor();
                } else {
                    document.getElementById('login-error').style.display = 'block';
                }
            }
        };

        window.cerrarSesionLocal = function() {
            localStorage.removeItem('asesorDatos');
            location.reload();
        };

        window.probarDesconexion = function() {
            window.postMessage({ type: 'GP_SERVER_LOGOUT' }, '*');
        };

        window.toggleEstado = function(nuevoEstado) {
            if (estadoActivo === nuevoEstado) forzarEstado(null);
            else forzarEstado(nuevoEstado);
        };

        async function forzarEstado(nuevoEstado) {
            let ahora = new Date();
            autoLogoutDisparado = false;

            if (estadoActivo !== null) {
                keepAliveWorker.postMessage('stop');
                let segundosPasados = Math.floor((ahora.getTime() - tiempoInicio.getTime()) / 1000);
                tiempos[estadoActivo] += segundosPasados;
                
                if (segundosPasados > 5) {
                    await addDoc(collection(db, "registros_tiempos"), {
                        asesor_id: asesorDatos.id,
                        asesor_nombre: asesorDatos.nombre,
                        estado: estadoActivo,
                        duracion_segundos: segundosPasados,
                        fecha: serverTimestamp()
                    });
                }
            }
            
            if (nuevoEstado !== null) {
                estadoActivo = nuevoEstado;
                tiempoInicio = ahora;
                keepAliveWorker.postMessage('start');
            } else {
                estadoActivo = null;
            }
            actualizarPantalla();
        }

        function actualizarPantalla() {
            let ahora = new Date();
            ['bano', 'comida', 'calidad'].forEach(estado => {
                let s = tiempos[estado];
                if (estadoActivo === estado && tiempoInicio) {
                    s += Math.floor((ahora.getTime() - tiempoInicio.getTime()) / 1000);
                }

                let m = Math.floor(s / 60);
                document.getElementById(`tiempo-${estado}`).innerText = `${m.toString().padStart(2, '0')}:${(s % 60).toString().padStart(2, '0')}`;

                const limiteSegundos = (asesorDatos.limites[estado] || 999) * 60;

                if (s >= limiteSegundos) {
                    document.getElementById(`alerta-${estado}`).style.display = 'block';
                    if (estadoActivo === estado && !autoLogoutDisparado) {
                        autoLogoutDisparado = true;
                        window.postMessage({ type: 'GP_SERVER_LOGOUT' }, '*');
                    }
                } else {
                    document.getElementById(`alerta-${estado}`).style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
