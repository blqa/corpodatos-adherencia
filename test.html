<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker de Tiempos</title>
    <!-- Tailwind y Phosphor Icons para tu diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        card: '#ffffff', border: '#e5e7eb',
                        text: '#1f2937', 'text-mute': '#6b7280',
                        brand: '#3b82f6', money: '#10b981', bg: '#f3f4f6'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-bg p-6 font-sans">

    <div class="max-w-4xl mx-auto">
        <!-- RELOJ PRINCIPAL (Tu diseño exacto) -->
        <div class="bg-card rounded-2xl border border-border py-5 px-2.5 text-center mb-5 shadow-sm relative overflow-hidden">
            
            <div id="mainLoader" class="absolute inset-0 bg-card/90 flex items-center justify-center z-10 rounded-2xl hidden">
                <div class="spinner border-4 border-brand border-t-transparent rounded-full w-8 h-8 animate-spin"></div>
            </div>

            <!-- Controles de Tiempos -->
            <div class="grid grid-cols-[1fr_1.2fr_1fr_1fr] items-center gap-1.5 mb-5" id="timersDisplay">
                
                <!-- BAÑO -->
                <button class="side-clock flex flex-col items-center justify-center opacity-50 p-1.5 rounded-lg relative z-10 w-full h-full border-none hover:bg-bg hover:opacity-100 hover:scale-105 transition-all cursor-pointer" id="clockBathContainer" type="button">
                    <div class="text-[0.65rem] font-extrabold uppercase text-text-mute mb-1 flex items-center justify-center gap-1">
                        <i class="ph-bold ph-toilet"></i> Baño
                    </div>
                    <div class="font-mono font-bold text-base text-text tabular-nums" id="dispBath">00:00</div>
                    <div class="text-[0.65rem] text-text-mute mt-0.5">/ <span id="limBath">15</span>m</div>
                    <div id="remBath" class="text-[0.7rem] font-extrabold mt-1 text-money">Restan: 15m</div>
                </button>
                
                <!-- ESTADO CENTRAL -->
                <div class="flex flex-col items-center border-x border-border px-2">
                    <div class="text-[0.7rem] uppercase tracking-widest text-text-mute font-extrabold mb-1.5" id="clockStatus">DISPONIBLE</div>
                    <div class="text-[clamp(2.5rem,6vw,4rem)] font-extrabold text-text tabular-nums leading-none text-brand" id="clockDisplay">00:00</div>
                    <div id="networkTimeBadge" class="text-[0.65rem] text-brand font-bold mt-1.5 opacity-100 transition-all duration-300 flex items-center gap-1">
                        <i class="ph-bold ph-check-circle"></i> Conectado a TouchPoint
                    </div>
                </div>

                <!-- COMIDA -->
                <button class="side-clock flex flex-col items-center justify-center opacity-50 p-1.5 rounded-lg relative z-10 w-full h-full border-none hover:bg-bg hover:opacity-100 hover:scale-105 transition-all cursor-pointer" id="clockFoodContainer" type="button">
                    <div class="text-[0.65rem] font-extrabold uppercase text-text-mute mb-1 flex items-center justify-center gap-1">
                        <i class="ph-bold ph-hamburger"></i> Comida
                    </div>
                    <div class="font-mono font-bold text-base text-text tabular-nums" id="dispFood">00:00</div>
                    <div class="text-[0.65rem] text-text-mute mt-0.5">/ <span id="limFood">45</span>m</div>
                    <div id="remFood" class="text-[0.7rem] font-extrabold mt-1 text-money">Restan: 45m</div>
                </button>

                <!-- CALIDAD -->
                <button class="side-clock flex flex-col items-center justify-center opacity-50 p-1.5 rounded-lg relative z-10 w-full h-full border-none hover:bg-bg hover:opacity-100 hover:scale-105 transition-all cursor-pointer" id="clockQualityContainer" type="button">
                    <div class="text-[0.65rem] font-extrabold uppercase text-text-mute mb-1 flex items-center justify-center gap-1">
                        <i class="ph-bold ph-headset"></i> Calidad
                    </div>
                    <div class="font-mono font-bold text-base text-text tabular-nums" id="dispQuality">00:00</div>
                    <div class="text-[0.65rem] text-text-mute mt-0.5">/ <span id="limQuality">15</span>m</div>
                    <div id="remQuality" class="text-[0.7rem] font-extrabold mt-1 text-money">Restan: 15m</div>
                </button>

            </div>
            
            <div class="grid grid-cols-2 gap-2.5 mt-4" id="actionButtons">
                <!-- Botón de pruebas para supervisor -->
                <button onclick="window.postMessage({ type: 'GP_SERVER_LOGOUT' }, '*')" class="col-span-2 text-xs bg-red-100 text-red-600 font-bold py-2 rounded-lg hover:bg-red-200 transition">
                    🧪 Forzar Logout de TouchPoint
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. LÓGICA DE TIEMPOS Y LÍMITES ---
        // (En un futuro estos límites los traeremos de tu Firebase)
        const limites = {
            bath: 15,
            food: 45,
            quality: 15
        };

        let tiempos = { bath: 0, food: 0, quality: 0 };
        let estadoActivo = null; 
        let tiempoInicio = null;
        let autoLogoutDisparado = false;

        // Worker para mantener precisión del cronómetro si minimizan la ventana
        const workerCode = `
            let timer;
            self.addEventListener('message', (e) => {
                if(e.data === 'start') timer = setInterval(() => self.postMessage('tick'), 1000);
                else if(e.data === 'stop') clearInterval(timer);
            });
        `;
        const keepAliveWorker = new Worker(URL.createObjectURL(new Blob([workerCode], {type: 'application/javascript'})));
        
        keepAliveWorker.onmessage = () => {
            if (estadoActivo) actualizarPantalla();
        };

        // --- 2. FUNCIÓN PARA CAMBIAR EL ESTADO VISUAL ---
        function setEstado(nuevoEstado) {
            let ahora = new Date();
            autoLogoutDisparado = false;

            // Si hay un cronómetro activo, lo detenemos y guardamos su tiempo
            if (estadoActivo) {
                keepAliveWorker.postMessage('stop');
                tiempos[estadoActivo] += Math.floor((ahora.getTime() - tiempoInicio.getTime()) / 1000);
                
                // Quitar estilos de "Activo" a la tarjeta anterior
                const oldContainer = document.getElementById(`clock${capitalize(estadoActivo)}Container`);
                if(oldContainer) {
                    oldContainer.classList.remove('opacity-100', 'ring-2', 'ring-brand', 'bg-blue-50');
                    oldContainer.classList.add('opacity-50');
                }
            }

            // Iniciar el nuevo estado
            estadoActivo = nuevoEstado;

            if (estadoActivo) {
                tiempoInicio = ahora;
                keepAliveWorker.postMessage('start');
                
                // Poner estilos de "Activo" a la nueva tarjeta
                const newContainer = document.getElementById(`clock${capitalize(estadoActivo)}Container`);
                if(newContainer) {
                    newContainer.classList.remove('opacity-50');
                    newContainer.classList.add('opacity-100', 'ring-2', 'ring-brand', 'bg-blue-50');
                }
                document.getElementById('clockStatus').innerText = `EN ${estadoActivo.toUpperCase()}`;
            } else {
                document.getElementById('clockStatus').innerText = "DISPONIBLE";
                document.getElementById('clockDisplay').innerText = "00:00";
            }
            
            actualizarPantalla();
        }

        // --- 3. ACTUALIZAR LOS NÚMEROS EN LA PANTALLA ---
        function actualizarPantalla() {
            let ahora = new Date();
            let tiempoCentral = 0;

            ['bath', 'food', 'quality'].forEach(estado => {
                let segundosUsados = tiempos[estado] || 0;
                
                if (estadoActivo === estado) {
                    let enVivo = Math.floor((ahora.getTime() - tiempoInicio.getTime()) / 1000);
                    segundosUsados += enVivo;
                    tiempoCentral = enVivo; // El reloj grande del medio muestra el tiempo de esta sesión
                }

                // Escribir en el contador pequeño (Ej. dispBath)
                let m = Math.floor(segundosUsados / 60);
                let s = segundosUsados % 60;
                let elDisp = document.getElementById(`disp${capitalize(estado)}`);
                if(elDisp) elDisp.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;

                // Calcular tiempo restante y escribirlo
                let limiteSegundos = limites[estado] * 60;
                let elRem = document.getElementById(`rem${capitalize(estado)}`);
                
                if (segundosUsados >= limiteSegundos) {
                    if (elRem) {
                        elRem.innerText = "¡EXCEDIDO!";
                        elRem.classList.replace('text-money', 'text-red-500');
                    }
                    
                    // DISPARAR EL LOGOUT A TOUCHPOINT
                    if (estadoActivo === estado && !autoLogoutDisparado) {
                        autoLogoutDisparado = true;
                        window.postMessage({ type: 'GP_SERVER_LOGOUT' }, '*');
                    }
                } else {
                    let restantes = limiteSegundos - segundosUsados;
                    if (elRem) {
                        elRem.innerText = `Restan: ${Math.floor(restantes/60)}m ${restantes%60}s`;
                        elRem.classList.replace('text-red-500', 'text-money');
                    }
                }
            });

            // Actualizar reloj central si hay un estado activo
            if (estadoActivo) {
                let cm = Math.floor(tiempoCentral / 60);
                let cs = tiempoCentral % 60;
                document.getElementById('clockDisplay').innerText = `${cm.toString().padStart(2, '0')}:${cs.toString().padStart(2, '0')}`;
            }
        }

        function capitalize(s) {
            return s.charAt(0).toUpperCase() + s.slice(1);
        }

        // --- 4. CONEXIÓN DIRECTA CON LA EXTENSIÓN ---
        // Escucha el grito de content_web.js y arranca los cronómetros correctos
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'GODSPLAN_COMMAND') {
                const action = event.data.action;
                
                // Mapeo de la orden de TouchPoint -> a los IDs de tu nuevo HTML
                if (action === 'START_BREAK_BATH') setEstado('bath');
                else if (action === 'START_BREAK_FOOD') setEstado('food');
                else if (action === 'START_QUALITY') setEstado('quality');
                else if (action === 'RESUME_WORK') setEstado(null);
            }
        });

    </script>
</body>
</html>
